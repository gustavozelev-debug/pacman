<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Chase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="score-board">Presos: <span id="arrests">0</span>/<span id="total-robbers">4</span> | Roubo: $<span id="stolen">0</span></div>
            <div class="lives-board">Viatura: <span id="lives">3</span></div>
        </header>
        
        <canvas id="gameCanvas" width="560" height="560"></canvas>
        
        <div id="message-overlay" class="hidden">
            <h1 id="message-text"></h1>
            <p>Pressione ESPAÇO para jogar novamente</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
